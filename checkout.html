<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Checkout - NEXBOOK</title>
    <script src="https://sdk.mercadopago.com/js/v2"></script>
</head>
<body>
    <div id="checkout-container"></div>

    <script>
        const mp = new MercadoPago('SUA_PUBLIC_KEY');
        
        const urlParams = new URLSearchParams(window.location.search);
        const plano = urlParams.get('plano');
        const user = JSON.parse(localStorage.getItem('user') || '{}');

        // Criar preferência
        fetch('/api/criar-pagamento', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                plano: plano,
                userId: user.uid,
                email: user.email
            })
        })
        .then(res => res.json())
        .then(data => {
            mp.checkout({
                preference: {
                    id: data.preference_id
                }
            }).render();
        });
    </script>
</body>
</html>
