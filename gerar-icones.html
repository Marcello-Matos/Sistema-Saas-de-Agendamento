<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Ícones NEXBOOK</title>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        
        p {
            color: #666;
            margin-bottom: 30px;
        }
        
        .btn {
            background: linear-gradient(135deg, #7c3aed, #c026d3);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            margin: 10px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(124,58,237,0.3);
        }
        
        .btn.secondary {
            background: #f1f5f9;
            color: #333;
        }
        
        .progress {
            margin-top: 20px;
            padding: 15px;
            background: #f8fafc;
            border-radius: 10px;
            display: none;
        }
        
        .preview {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 20px;
        }
        
        .preview-item {
            text-align: center;
        }
        
        .preview-item canvas {
            width: 64px;
            height: 64px;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 Gerador de Ícones NEXBOOK</h1>
        <p>Clique no botão abaixo para gerar todos os ícones necessários para o PWA</p>
        
        <button class="btn" onclick="generateIcons()">
            <i class="fas fa-download"></i> Gerar Ícones
        </button>
        
        <button class="btn secondary" onclick="createFolder()">
            <i class="fas fa-folder"></i> Criar pasta icons/
        </button>
        
        <div id="progress" class="progress">
            <p id="progressText">Gerando ícones...</p>
        </div>
        
        <div id="preview" class="preview"></div>
    </div>

    <script>
        async function generateIcons() {
            const sizes = [72, 96, 128, 144, 152, 192, 384, 512];
            const progress = document.getElementById('progress');
            const progressText = document.getElementById('progressText');
            const preview = document.getElementById('preview');
            
            progress.style.display = 'block';
            preview.innerHTML = '';
            
            for (let i = 0; i < sizes.length; i++) {
                const size = sizes[i];
                
                progressText.textContent = `Gerando ícone ${size}x${size} (${i+1}/${sizes.length})...`;
                
                // Criar canvas
                const canvas = document.createElement('canvas');
                canvas.width = size;
                canvas.height = size;
                const ctx = canvas.getContext('2d');
                
                // Fundo gradiente
                const gradient = ctx.createLinearGradient(0, 0, size, size);
                gradient.addColorStop(0, '#7c3aed');
                gradient.addColorStop(1, '#c026d3');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, size, size);
                
                // Borda sutil
                ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                ctx.lineWidth = Math.max(2, size/50);
                ctx.strokeRect(2, 2, size-4, size-4);
                
                // Texto
                ctx.fillStyle = 'white';
                ctx.font = `bold ${size/2.2}px 'Arial', 'Plus Jakarta Sans', sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('N', size/2, size/2);
                
                // Preview
                const previewCanvas = document.createElement('canvas');
                previewCanvas.width = 64;
                previewCanvas.height = 64;
                const previewCtx = previewCanvas.getContext('2d');
                previewCtx.drawImage(canvas, 0, 0, 64, 64);
                
                const previewDiv = document.createElement('div');
                previewDiv.className = 'preview-item';
                previewDiv.innerHTML = `
                    ${previewCanvas.outerHTML}
                    <div style="font-size: 12px; margin-top: 5px;">${size}x${size}</div>
                `;
                preview.appendChild(previewDiv);
                
                // Download
                const link = document.createElement('a');
                link.download = `icon-${size}x${size}.png`;
                link.href = canvas.toDataURL('image/png');
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
                // Pequeno delay para não sobrecarregar
                await new Promise(resolve => setTimeout(resolve, 500));
            }
            
            progressText.textContent = '✅ Todos os ícones gerados com sucesso!';
            setTimeout(() => {
                progress.style.display = 'none';
            }, 3000);
        }
        
        function createFolder() {
            alert('Crie uma pasta chamada "icons" no seu projeto e mova todos os ícones para lá!');
        }
    </script>
    
    <!-- Font Awesome para ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</body>
</html>
